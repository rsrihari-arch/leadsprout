services:
  - type: web
    name: leadsprout
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: APOLLO_EMAIL
        sync: false
      - key: APOLLO_PASSWORD
        sync: false
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
